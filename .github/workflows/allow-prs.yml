# Allow GitHub Actions to create and approve pull requests
# HINWEIS: Auto-Approve via GITHUB_TOKEN ist nicht erlaubt (GitHub-Sicherheitsregel).
# Dieser Workflow ist deaktiviert. Der Auto-Merge erfolgt direkt in auto-merge-claude.yml.
name: Allow GitHub Actions to Create and Approve PRs
on:
  workflow_dispatch:
jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: echo "Auto-Approve via GITHUB_TOKEN ist nicht erlaubt. Workflow deaktiviert."
