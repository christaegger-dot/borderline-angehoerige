name: Auto-PR and merge for Claude Code
on:
  push:
    branches: ['claude/**']
permissions:
  contents: write
  pull-requests: write
jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or find PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # 1) Offene PR suchen
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url -q '.[0].url' 2>/dev/null || true)

          # 2) Keine offene PR → neue erstellen
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --title "Auto: $BRANCH" --body "" --base main --head "$BRANCH" 2>&1) || {
              echo "gh pr create fehlgeschlagen: $PR_URL"
              echo "Prüfe ob Branch bereits vollständig in main ist..."
              git fetch origin main
              DIFF=$(git diff origin/main...HEAD --stat)
              if [ -z "$DIFF" ]; then
                echo "Keine Unterschiede zu main – nichts zu tun."
                exit 0
              fi
              echo "Es gibt Unterschiede, aber PR-Erstellung schlug fehl. Abbruch."
              exit 1
            }
          fi

          echo "PR: $PR_URL"
          sleep 60
          gh pr merge --auto --merge "$PR_URL" || gh pr merge --merge "$PR_URL"
          git push origin --delete "$BRANCH" || true
