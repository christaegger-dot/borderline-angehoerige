name: Auto-PR and merge for Claude Code
on:
  push:
    branches: ['claude/**']
permissions:
  contents: write
  pull-requests: write
jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create or find PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          # Offene PR suchen
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url -q '.[0].url' || echo "")

          # Keine offene PR → neue erstellen
          if [ -z "$PR_URL" ]; then
            echo "Erstelle neue PR..."
            PR_URL=$(gh pr create \
              --title "Auto: $BRANCH" \
              --body "Auto-created by workflow" \
              --base main \
              --head "$BRANCH") || { echo "PR create failed"; exit 1; }
          fi

          echo "PR: $PR_URL"
          sleep 60
          gh pr merge --merge "$PR_URL" || gh pr merge --auto --merge "$PR_URL"
          git push origin --delete "$BRANCH" || true
