name: Auto-PR and merge for Claude Code
on:
  push:
    branches: ['claude/**']
permissions:
  contents: write
  pull-requests: write
jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or find PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          # Try to create a new PR; if one already exists, find it
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "Claude Code: $BRANCH" \
            --body "Auto-generated by Claude Code" 2>&1) || \
          PR_URL=$(gh pr view "$BRANCH" --json url --jq .url)
          echo "PR: $PR_URL"
          sleep 60
          gh pr merge --auto --merge "$PR_URL" || gh pr merge --merge "$PR_URL"
          git push origin --delete "$BRANCH" || true
