name: Auto-PR and merge for Claude Code

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or find PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          # 1. Bereits in main? → sauber abbrechen
          git fetch origin main
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "Branch bereits in main enthalten – nichts zu tun."
            exit 0
          fi

          # 2. Offene PR suchen
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url -q '.[0].url' 2>/dev/null || true)

          # 3. Keine offene PR → neue erstellen
          if [ -z "$PR_URL" ]; then
            echo "Erstelle neue PR..."
            PR_URL=$(gh pr create \
              --title "Auto: $BRANCH" \
              --body "" \
              --base main \
              --head "$BRANCH" 2>&1) || {
              echo "PR-Erstellung fehlgeschlagen: $PR_URL"
              echo "Manuelles Eingreifen nötig."
              exit 1
            }
            echo "PR: $PR_URL"
          else
            echo "Bestehende PR gefunden: $PR_URL"
          fi

          # 4. Warten auf Netlify Preview (60s)
          echo "Warte 60s auf Netlify Preview..."
          sleep 60

          # 5. Branch auf main rebasen um Konflikte zu vermeiden
          echo "Rebase auf main..."
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin main
          git rebase origin/main || {
            echo "Rebase fehlgeschlagen – Merge-Konflikt muss manuell gelöst werden: $PR_URL"
            exit 1
          }
          git push --force-with-lease origin "$BRANCH"

          # 6. Mergen
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "Merge PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" \
            --merge \
            --delete-branch \
            --admin 2>&1 || {
            echo "Merge fehlgeschlagen – bitte PR manuell mergen: $PR_URL"
            exit 1
          }
          echo "Fertig."
