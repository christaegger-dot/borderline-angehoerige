name: Auto-PR and merge for Claude Code
on:
  push:
    branches: ['claude/**']
permissions:
  contents: write
  pull-requests: write
jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create or find PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          # Pruefen ob Branch noch existiert
          if ! git ls-remote --exit-code origin "$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH existiert nicht mehr - Workflow beendet."
            exit 0
          fi

          # Offene PR suchen
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url -q '.[0].url' 2>/dev/null || echo "")

          # Keine offene PR -> neue erstellen
          if [ -z "$PR_URL" ]; then
            echo "Erstelle neue PR..."
            CREATE_OUT=$(gh pr create \
              --title "Auto: $BRANCH" \
              --body "Auto-created by workflow" \
              --base main \
              --head "$BRANCH" 2>&1) || true
            if echo "$CREATE_OUT" | grep -q "https://"; then
              PR_URL=$(echo "$CREATE_OUT" | grep -o "https://github.com[^ ]*")
            else
              echo "PR create fehlgeschlagen oder kein Diff: $CREATE_OUT"
              exit 0
            fi
          fi

          echo "PR: $PR_URL"
          sleep 60

          # Merge versuchen
          if gh pr merge --merge "$PR_URL" 2>&1; then
            echo "PR erfolgreich gemergt"
            git push origin --delete "$BRANCH" 2>/dev/null || true
          else
            echo "Merge fehlgeschlagen - PR bleibt offen fuer manuelle Bearbeitung"
            exit 0
          fi
