name: Auto-PR and merge for Claude Code
on:
  push:
    branches: ['claude/**']
permissions:
  contents: write
  pull-requests: write
jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr create --base main --head ${{ github.ref_name }} --title "Claude Code: ${{ github.ref_name }}" --body "Auto-generated by Claude Code" 2>&1) || true
          echo "PR: $PR_URL"
          sleep 60
          gh pr merge --auto --merge "$PR_URL" || gh pr merge --merge "$PR_URL"
          git push origin --delete ${{ github.ref_name }} || true
