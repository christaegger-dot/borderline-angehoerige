name: Auto-PR and merge for Claude Code
on:
  push:
    branches: ['claude/**']
permissions:
  contents: write
  pull-requests: write
jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or find PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"

          echo "Branch: $BRANCH"

          # 1) Prüfe ob es Unterschiede zu main gibt
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD --stat)
          if [ -z "$DIFF" ]; then
            echo "Keine Unterschiede zu main – nichts zu tun."
            exit 0
          fi
          echo "Änderungen gefunden:"
          echo "$DIFF"

          # 2) Offene PR suchen
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url -q '.[0].url' 2>/dev/null || true)

          # 3) Keine offene PR → neue erstellen
          if [ -z "$PR_URL" ]; then
            echo "Erstelle neue PR..."
            if ! PR_URL=$(gh pr create --title "Auto: $BRANCH" --body "Auto-created by workflow" --base main --head "$BRANCH" 2>/tmp/gh-err); then
              echo "gh pr create stderr:"
              cat /tmp/gh-err
              exit 1
            fi
          fi

          echo "PR: $PR_URL"
          sleep 60
          gh pr merge --auto --merge "$PR_URL" || gh pr merge --merge "$PR_URL"
          git push origin --delete "$BRANCH" || true
