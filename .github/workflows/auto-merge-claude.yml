name: Auto-PR and merge for Claude Code
on:
  push:
    branches: ['claude/**']
permissions:
  contents: write
  pull-requests: write
jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or find PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url -q '.[0].url' 2>/dev/null)
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --title "Auto: $BRANCH" --body "" --base main --head "$BRANCH")
          fi
          echo "PR_URL=$PR_URL" >> $GITHUB_OUTPUT
          echo "PR: $PR_URL"
          sleep 60
          gh pr merge --auto --merge "$PR_URL" || gh pr merge --merge "$PR_URL"
          git push origin --delete "$BRANCH" || true
