<text x="64.00" y="1005.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="11.5" fill="#4b5563" font-weight="normal" font-style="italic" text-anchor="start" opacity="0.9">Quellen: S3-Leitlinie Borderline-Persönlichkeitsstörung (DGPPN 2022, AWMF 038-015) · NICE CG78 (2009)</text>
