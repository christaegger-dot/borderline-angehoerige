<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1045" width="760" height="1045" role="img" aria-labelledby="a1t a1d"><title id="a1t">Den Weg zur Abklärung begleiten</title><desc id="a1d">Fünf Schritte, wie Angehörige eine Abklärung begleiten können, entlang einer Zeitachse von oben nach unten. 1: Erste Anlaufstelle anregen oder begleiten – anbieten ja, erzwingen nein. 2: Die fachliche Abklärung machen Fachpersonen – Fachärztinnen und Fachärzte für Psychiatrie und Psychotherapie oder klinische Psychologinnen und Psychologen. 3: Eine Abklärung entsteht aus einem Muster über die Zeit, nicht aus einem einzelnen Moment. 4: Die Fachperson ordnet ein und grenzt ab; ob Angehörige einbezogen werden, hängt vom Einverständnis ab. 5: Es entsteht ein Behandlungsplan, oft eine störungsspezifische Psychotherapie wie DBT. Eine Diagnose ist ein Anfang, kein Etikett.</desc><rect width="760" height="1045" fill="#faf7f2"/>
<text x="64.00" y="70.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="13.5" fill="#4f6b5e" font-weight="600" font-style="normal" text-anchor="start" letter-spacing="2.2">FÜR ANGEHÖRIGE · FÜNF SCHRITTE</text>
<text x="64.00" y="116.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="34" fill="#1f2a37" font-weight="700" font-style="normal" text-anchor="start">Den Weg zur Abklärung begleiten</text>
<rect x="64" y="132" width="58" height="3" fill="#5b3a4e"/>
<text x="64.00" y="162.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="16.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Was dabei passiert – und was Ihre Rolle ist (und was nicht)</text>
<text x="76" y="506" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="11" fill="#4f6b5e" font-weight="600" letter-spacing="3" text-anchor="middle" opacity="0.55" transform="rotate(90 76 506)">ZEIT</text>
<line x1="120" y1="273" x2="120" y2="355" stroke="#5b3a4e" stroke-width="2.4" opacity="0.45" stroke-linecap="round"/>
<line x1="120" y1="401" x2="120" y2="483" stroke="#5b3a4e" stroke-width="2.4" opacity="0.45" stroke-linecap="round"/>
<line x1="120" y1="529" x2="120" y2="611" stroke="#5b3a4e" stroke-width="2.4" opacity="0.45" stroke-linecap="round"/>
<line x1="120" y1="657" x2="120" y2="739" stroke="#5b3a4e" stroke-width="2.4" opacity="0.45" stroke-linecap="round"/>
<circle cx="120" cy="250" r="23" fill="#5b3a4e"/>
<text x="120.00" y="256.50" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18" fill="#faf7f2" font-weight="700" font-style="normal" text-anchor="middle">1</text>
<text x="178.00" y="246.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18.5" fill="#1f2a37" font-weight="600" font-style="normal" text-anchor="start">Erste Anlaufstelle</text>
<text x="178.00" y="267.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Den ersten Kontakt dürfen Sie anregen oder begleiten – Hausärzt:in,</text><text x="178.00" y="286.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Praxis, Ambulatorium. Anbieten ja, erzwingen nein.</text>
<circle cx="120" cy="378" r="23" fill="#5b3a4e"/>
<text x="120.00" y="384.50" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18" fill="#faf7f2" font-weight="700" font-style="normal" text-anchor="middle">2</text>
<text x="178.00" y="374.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18.5" fill="#1f2a37" font-weight="600" font-style="normal" text-anchor="start">Fachliche Abklärung</text>
<text x="178.00" y="395.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Die Abklärung machen Fachpersonen – Fachärzt:innen für Psychiatrie</text><text x="178.00" y="414.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">und Psychotherapie oder klinische Psycholog:innen.</text>
<circle cx="120" cy="506" r="23" fill="#5b3a4e"/>
<text x="120.00" y="512.50" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18" fill="#faf7f2" font-weight="700" font-style="normal" text-anchor="middle">3</text>
<text x="178.00" y="502.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18.5" fill="#1f2a37" font-weight="600" font-style="normal" text-anchor="start">Mehrere Gespräche</text>
<text x="178.00" y="523.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Eine Abklärung entsteht aus einem Muster über die Zeit, nicht aus</text><text x="178.00" y="542.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">einem einzelnen Moment. Geduld ist hier kein Nichtstun.</text>
<circle cx="120" cy="634" r="23" fill="#5b3a4e"/>
<text x="120.00" y="640.50" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18" fill="#faf7f2" font-weight="700" font-style="normal" text-anchor="middle">4</text>
<text x="178.00" y="630.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18.5" fill="#1f2a37" font-weight="600" font-style="normal" text-anchor="start">Rückmeldung &amp; Einordnung</text>
<text x="178.00" y="651.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Die Fachperson ordnet ein und grenzt ab. Ob Sie einbezogen werden,</text><text x="178.00" y="670.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">hängt vom Einverständnis Ihres/Ihrer Angehörigen ab – das kann</text><text x="178.00" y="689.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">schwer sein.</text>
<circle cx="120" cy="762" r="23" fill="#5b3a4e"/>
<text x="120.00" y="768.50" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18" fill="#faf7f2" font-weight="700" font-style="normal" text-anchor="middle">5</text>
<text x="178.00" y="758.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="18.5" fill="#1f2a37" font-weight="600" font-style="normal" text-anchor="start">Behandlungsplanung</text>
<text x="178.00" y="779.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Jetzt entsteht ein Behandlungsplan – oft eine störungsspezifische</text><text x="178.00" y="798.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Psychotherapie wie DBT. Fragen Sie, wie Sie unterstützen können.</text>
<rect x="64" y="812" width="3" height="32" fill="#5b3a4e"/>
<text x="86.00" y="834.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="17.5" fill="#1f2a37" font-weight="normal" font-style="italic" text-anchor="start">Eine Diagnose ist ein Anfang, kein Etikett.</text>
<text x="64.00" y="888.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="11.5" fill="#4f6b5e" font-weight="600" font-style="normal" text-anchor="start" letter-spacing="2.0">FÜR JUGENDLICHE</text>
<text x="64.00" y="908.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Bei Jugendlichen läuft die Abklärung über die Kinder- und Jugendpsychiatrie (KJPP)</text><text x="64.00" y="927.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">– hier ist die Familie meist von Anfang an Teil des Prozesses.</text>
