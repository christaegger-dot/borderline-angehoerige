<text x="120.00" y="452.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="11" fill="#4f6b5e" font-weight="600" font-style="normal" text-anchor="middle" letter-spacing="2" opacity="0.62">IMPULS &amp;</text>
<text x="120.00" y="467.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="11" fill="#4f6b5e" font-weight="600" font-style="normal" text-anchor="middle" letter-spacing="2" opacity="0.62">VERHALTEN</text>
