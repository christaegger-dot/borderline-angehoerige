<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1045" width="820" height="1045" role="img" aria-labelledby="a2t a2d"><title id="a2t">Borderline kommt selten allein</title><desc id="a2d">Konstellation: Borderline im Zentrum, häufige Begleiterkrankungen als Satelliten, gruppiert nach klinischen Familien. Affektiv: Depression, am häufigsten. Angst und Trauma: Angststörungen, PTBS. Impuls und Verhalten: Substanzgebrauch, Essstörungen, ADHS. Die Kreisgrösse zeigt, wie häufig eine Begleiterkrankung als Einzeldiagnose ist. Für Angehörige: mehrere Diagnosen bedeuten mehr Komplexität, nicht mehr Schuld; die Behandlung beginnt oft beim Dringlichsten; Sie müssen nicht sortieren, was was ist.</desc><rect width="820" height="1045" fill="#faf7f2"/>
<defs><radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#5b3a4e" stop-opacity="0.07"/><stop offset="100%" stop-color="#5b3a4e" stop-opacity="0"/></radialGradient></defs>
<text x="64.00" y="70.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="13.5" fill="#4f6b5e" font-weight="600" font-style="normal" text-anchor="start" letter-spacing="2.2">KONSTELLATION · BEGLEITERKRANKUNGEN</text>
<text x="64.00" y="116.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="34" fill="#1f2a37" font-weight="700" font-style="normal" text-anchor="start">Borderline kommt selten allein</text>
<rect x="64" y="132" width="58" height="3" fill="#5b3a4e"/>
<text x="64.00" y="162.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="16.5" fill="#4b5563" font-weight="normal" font-style="normal" text-anchor="start">Warum mehrere Diagnosen zusammen auftreten – und was das für Sie bedeutet</text>
