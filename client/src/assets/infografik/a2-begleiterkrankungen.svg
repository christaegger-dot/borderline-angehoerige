<text x="412.00" y="418.50" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="19" fill="#faf7f2" font-weight="600" font-style="normal" text-anchor="middle">Borderline</text>
<text x="64.00" y="712.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="12.5" fill="#4b5563" font-weight="normal" font-style="italic" text-anchor="start">Die Kreisgrösse zeigt, wie häufig eine Begleiterkrankung ist – gemessen als Einzeldiagnose.</text>
<rect x="64" y="734" width="3" height="98" fill="#5b3a4e"/>
<text x="86.00" y="752.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="17.5" fill="#1f2a37" font-weight="normal" font-style="italic" text-anchor="start">Mehrere Diagnosen heissen mehr Komplexität – nicht mehr Schuld.</text>
<text x="86.00" y="782.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="17.5" fill="#1f2a37" font-weight="normal" font-style="italic" text-anchor="start">Die Behandlung beginnt oft beim Dringlichsten – das ist kein Widerspruch.</text>
<text x="86.00" y="812.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="17.5" fill="#1f2a37" font-weight="normal" font-style="italic" text-anchor="start">Sie müssen nicht sortieren, was was ist.</text>
<rect x="64" y="844" width="692" height="87" rx="10" fill="#dde3d4"/>
<text x="84.00" y="866.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="11.5" fill="#476358" font-weight="700" font-style="normal" text-anchor="start" letter-spacing="2.0">HINWEIS</text>
<text x="84.00" y="886.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14" fill="#1f2a37" font-weight="normal" font-style="normal" text-anchor="start">Kommt eine Depression dazu, braucht es oft mehr fachliche Aufmerksamkeit – auch</text><text x="84.00" y="905.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14" fill="#1f2a37" font-weight="normal" font-style="normal" text-anchor="start">für die Sicherheit. Eine abgestimmte Behandlung, die beides im Blick hat,</text><text x="84.00" y="924.00" font-family="'Source Serif 4','Source Serif 4 Variable',Georgia,serif" font-size="14" fill="#1f2a37" font-weight="normal" font-style="normal" text-anchor="start">entlastet auch Sie.</text>
