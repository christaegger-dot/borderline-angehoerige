[build]
  command = "npx vite build"
  publish = "dist/public"

[[redirects]]
  from = "/notfallkarte.html"
  to = "/notfallkarte.html"
  status = 200
  force = true

[[redirects]]
  from = "/*.pdf"
  to = "/:splat.pdf"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
