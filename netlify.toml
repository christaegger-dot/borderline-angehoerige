[build]
  command = "npx vite build"
  publish = "dist/public"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; manifest-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://files.manuscdn.com data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; media-src 'self' https://files.manuscdn.com"

[[redirects]]
  from = "/notfallkarte.html"
  to = "/notfallkarte.html"
  status = 200
  force = true

[[redirects]]
  from = "/notfall"
  to = "/soforthilfe"
  status = 301
  force = true

[[redirects]]
  from = "/unterstuetzen"
  to = "/unterstuetzen/uebersicht"
  status = 301
  force = true

[[redirects]]
  from = "/selbsthilfegruppen"
  to = "/beratung"
  status = 301
  force = true

[[redirects]]
  from = "/therapieangebote"
  to = "/unterstuetzen/therapie#therapieangebote"
  status = 301
  force = true

[[redirects]]
  from = "/soforthilfe"
  to = "/soforthilfe/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.pdf"
  to = "/:splat.pdf"
  status = 200
  force = true

[[redirects]]
  from = "/*.webp"
  to = "/:splat.webp"
  status = 200
  force = true
